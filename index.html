<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sydny Ruiz - Documentary and Portrait Photographer based in Daly City, CA. Capturing raw emotion and real connection.">
<title>Sydny Ruiz | Photography</title>

<style>
* {box-sizing:border-box;}
body {
    margin:0;
    font-family:Helvetica, Arial, sans-serif;
    background:#0d0d0d;
    color:white;
    scroll-behavior:smooth;
}

/* HERO */
.hero {
    background:url('hero.jpg') center/cover no-repeat;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    position:relative;
}

.hero::after {
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
}

.hero-content {
    position:relative;
    z-index:2;
}

.hero h1 {
    font-size:55px;
    letter-spacing:3px;
    margin:0;
}

.hero p {
    color:#bbb;
    margin-top:15px;
    font-size:18px;
}

/* SECTION */
.section {
    padding:100px 20px;
    max-width:1200px;
    margin:auto;
}

.section h2 {
    text-transform:uppercase;
    letter-spacing:2px;
    font-size:22px;
    margin-bottom:40px;
}

/* GALLERY */
.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.gallery img {
    width:100%;
    height:380px;
    object-fit:cover;
    cursor:pointer;
    transition:0.4s;
    opacity:0;
    transform:translateY(20px);
}

.gallery img.visible {
    opacity:1;
    transform:translateY(0);
}

.gallery img:hover {
    transform:scale(1.03);
}

/* LIGHTBOX */
.lightbox {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    align-items:center;
    justify-content:center;
}

.lightbox img {
    max-width:90%;
    max-height:90%;
}

/* CONTACT */
.contact {
    text-align:center;
    padding:100px 20px;
}

.contact a {
    color:white;
    text-decoration:none;
    border-bottom:1px solid white;
}

footer {
    text-align:center;
    padding:40px;
    color:#666;
}
</style>
</head>
<body>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Sydny Ruiz</h1>
<p>WORK IN PROGRESS....</p>
</div>
</section>

<!-- DOCUMENTARY -->
<section class="section">
<h2>My Personal Work</h2>
<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="doc3.jpg">
<img src="doc4.jpg">
</div>
</section>

<!-- PORTRAITS -->
<section class="section">
<h2>Portraits & Events</h2>
<div class="gallery">
<img src="por1.jpg">
<img src="por2.jpg">
<img src="por3.jpg">
<img src="por4.jpg">
</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Booking 2026</h2>
<p>Email: <a href="mailto:ruiz.workflow@gmail.com">ruiz.workflow@gmail.com</a></p>
<p>Based in Oakland, CA</p>
</section>

<footer>
© 2026 Sydny Ruiz
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<img src="">
</div>

<script>
// Fade in on scroll
const images = document.querySelectorAll('.gallery img');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if(entry.isIntersecting){
            entry.target.classList.add('visible');
        }
    });
});
images.forEach(img => observer.observe(img));

// Lightbox
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');

images.forEach(img => {
    img.addEventListener('click', () => {
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
    });
});

lightbox.addEventListener('click', () => {
    lightbox.style.display = 'none';
});
</script>

</body>
</html>
