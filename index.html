<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sydny Ruiz | Photographer</title>
<style>
body {
    margin: 0;
    font-family: Helvetica, Arial, sans-serif;
    background-color: #111;
    color: white;
}

header {
    text-align: center;
    padding: 60px 20px;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

p.tagline {
    color: #aaa;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
    padding: 20px;
}

.gallery img {
    width: 100%;
    height: 300px;
    object-fit: cover;
}

.about {
    padding: 60px 20px;
    max-width: 800px;
    margin: auto;
    text-align: center;
}

footer {
    text-align: center;
    padding: 30px;
    font-size: 14px;
    color: #777;
}
</style>
</head>
<body>

<header>
    <h1>Sydny Ruiz</h1>
    <p class="tagline">Portrait & Documentary Photographer</p>
</header>

<section class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
</section>

<section class="about">
    <h2>About</h2>
    <p>
    I’m a photographer based in Daly City, capturing emotion,
    intimacy, and real moments. My work focuses on connection
    and storytelling.
    </p>
</section>

<footer>
    © 2026 Sydny Ruiz | Contact: your@email.com
</footer>

</body>
</html>
